name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse every JSON config
        run: .github/scripts/ci/validate-json.sh
      - name: Shape assertions
        run: .github/scripts/ci/assert-shapes.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: .github/scripts/ci/shellcheck-all.sh

  discover-tests:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.find.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: .github/scripts/ci/discover-tests.sh >> "$GITHUB_OUTPUT"

  plugin-tests:
    needs: discover-tests
    if: needs.discover-tests.outputs.plugins != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.discover-tests.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run ${{ matrix.plugin }} tests
        run: bash plugins/${{ matrix.plugin }}/tests/run.sh

  ci-success:
    if: always()
    needs: [validate-json, shellcheck, discover-tests, plugin-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all jobs succeeded
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: .github/scripts/ci/check-needs.sh
